    <main>
        <h2>Contact <span class="text-gradient">Me</span></h2>
        
        <div class="contact-container">
            <div class="contact-info">
                <p><i class="fas fa-phone"></i> <strong>Phone:</strong> <a href="tel:8951568258" style="color: var(--text-color); text-decoration: none;">8951568258</a></p>
                <p><i class="fas fa-envelope"></i> <strong>Email:</strong> <a href="mailto:pavanpavand49@gmail.com" style="color: var(--text-color); text-decoration: none;">pavanpavand49@gmail.com</a></p>
                <p><i class="fas fa-map-marker-alt"></i> <strong>Location:</strong> Tiptur, Tumkur District, Karnataka</p>
            </div>

            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Thank you for reaching out! This is a demo form. Please use the email provided above to contact me directly.');">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" class="form-control" required placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" class="form-control" required placeholder="Enter your message"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-submit">Send Message <i class="fas fa-paper-plane" style="margin-left: 5px;"></i></button>
            </form>
        </div>
    </main>
